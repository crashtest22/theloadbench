<!-- OPTION A: Minimal Typographic — clean, modern, text-forward -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0f1117"/>
  <!-- Horizontal rule in brass -->
  <rect x="56" y="230" width="400" height="4" fill="#c8752a"/>
  <!-- TLB bold letters -->
  <text x="256" y="222" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="130" fill="#ffffff" text-anchor="middle" letter-spacing="-4">TLB</text>
  <!-- Tagline below rule -->
  <text x="256" y="272" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="#c8752a" text-anchor="middle" letter-spacing="8">THE LOAD BENCH</text>
  <!-- Small cartridge dots accent -->
  <circle cx="186" cy="234" r="5" fill="#c8752a"/>
  <circle cx="326" cy="234" r="5" fill="#c8752a"/>
</svg>
