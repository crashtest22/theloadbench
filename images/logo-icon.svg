<!-- OPTION B: Crosshair/Scope Reticle — precision rifle angle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0f1117"/>
  <!-- Outer circle -->
  <circle cx="256" cy="220" r="130" fill="none" stroke="#c8752a" stroke-width="3"/>
  <!-- Inner circle -->
  <circle cx="256" cy="220" r="30" fill="none" stroke="#c8752a" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="256" cy="220" r="5" fill="#c8752a"/>
  <!-- Crosshair lines - horizontal, with gap in center -->
  <line x1="126" y1="220" x2="218" y2="220" stroke="#c8752a" stroke-width="2"/>
  <line x1="294" y1="220" x2="386" y2="220" stroke="#c8752a" stroke-width="2"/>
  <!-- Crosshair lines - vertical, with gap -->
  <line x1="256" y1="90" x2="256" y2="182" stroke="#c8752a" stroke-width="2"/>
  <line x1="256" y1="258" x2="256" y2="350" stroke="#c8752a" stroke-width="2"/>
  <!-- Mil-dot style marks on reticle -->
  <circle cx="220" cy="220" r="3" fill="#c8752a"/>
  <circle cx="292" cy="220" r="3" fill="#c8752a"/>
  <circle cx="256" cy="184" r="3" fill="#c8752a"/>
  <circle cx="256" cy="256" r="3" fill="#c8752a"/>
  <!-- Text -->
  <text x="256" y="420" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="34" fill="#ffffff" text-anchor="middle" letter-spacing="3">THE LOAD BENCH</text>
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="14" fill="#c8752a" text-anchor="middle" letter-spacing="6">PRECISION HANDLOADING</text>
</svg>
