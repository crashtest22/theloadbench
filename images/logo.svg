<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0f1117"/>

  <!-- Outer scope ring -->
  <circle cx="256" cy="230" r="175" fill="none" stroke="#c8752a" stroke-width="3.5"/>
  <!-- Inner thin ring -->
  <circle cx="256" cy="230" r="160" fill="none" stroke="#c8752a" stroke-width="1" opacity="0.3"/>

  <!-- === PR2-MIL FFP style reticle === -->
  <!-- Center dot -->
  <circle cx="256" cy="230" r="3.5" fill="#c8752a"/>

  <!-- Main horizontal crosshair — thick posts to center gap -->
  <line x1="82" y1="230" x2="226" y2="230" stroke="#c8752a" stroke-width="2.5"/>
  <line x1="286" y1="230" x2="430" y2="230" stroke="#c8752a" stroke-width="2.5"/>

  <!-- Main vertical crosshair — top post -->
  <line x1="256" y1="56" x2="256" y2="200" stroke="#c8752a" stroke-width="2.5"/>

  <!-- === Christmas tree holdover below center === -->
  <!-- Vertical stem down -->
  <line x1="256" y1="260" x2="256" y2="385" stroke="#c8752a" stroke-width="2"/>

  <!-- Holdover row 1 — 1 mil down, ±2 mil wide -->
  <line x1="220" y1="278" x2="292" y2="278" stroke="#c8752a" stroke-width="2"/>
  <!-- Row 1 mil-dots -->
  <circle cx="220" cy="278" r="2.5" fill="#c8752a"/>
  <circle cx="292" cy="278" r="2.5" fill="#c8752a"/>
  <circle cx="238" cy="278" r="2" fill="#c8752a"/>
  <circle cx="274" cy="278" r="2" fill="#c8752a"/>

  <!-- Holdover row 2 — 2 mil down, ±4 mil wide -->
  <line x1="184" y1="308" x2="328" y2="308" stroke="#c8752a" stroke-width="2"/>
  <circle cx="184" cy="308" r="2.5" fill="#c8752a"/>
  <circle cx="328" cy="308" r="2.5" fill="#c8752a"/>
  <circle cx="220" cy="308" r="2" fill="#c8752a"/>
  <circle cx="292" cy="308" r="2" fill="#c8752a"/>

  <!-- Holdover row 3 — 3 mil down, ±5 mil wide -->
  <line x1="166" y1="338" x2="346" y2="338" stroke="#c8752a" stroke-width="1.5"/>
  <circle cx="166" cy="338" r="2.5" fill="#c8752a"/>
  <circle cx="346" cy="338" r="2.5" fill="#c8752a"/>
  <circle cx="202" cy="338" r="2" fill="#c8752a"/>
  <circle cx="310" cy="338" r="2" fill="#c8752a"/>

  <!-- Holdover row 4 — 4 mil down, ±6 mil wide -->
  <line x1="148" y1="368" x2="364" y2="368" stroke="#c8752a" stroke-width="1.5"/>
  <circle cx="148" cy="368" r="2.5" fill="#c8752a"/>
  <circle cx="364" cy="368" r="2.5" fill="#c8752a"/>
  <circle cx="184" cy="368" r="2" fill="#c8752a"/>
  <circle cx="328" cy="368" r="2" fill="#c8752a"/>

  <!-- Horizontal mil-dot stadia (left side, above center) -->
  <circle cx="220" cy="230" r="2.5" fill="#c8752a"/>
  <circle cx="184" cy="230" r="2.5" fill="#c8752a"/>
  <circle cx="148" cy="230" r="2.5" fill="#c8752a"/>
  <!-- Right side -->
  <circle cx="292" cy="230" r="2.5" fill="#c8752a"/>
  <circle cx="328" cy="230" r="2.5" fill="#c8752a"/>
  <circle cx="364" cy="230" r="2.5" fill="#c8752a"/>

  <!-- Vertical mil-dot stadia (top) -->
  <circle cx="256" cy="194" r="2.5" fill="#c8752a"/>
  <circle cx="256" cy="158" r="2.5" fill="#c8752a"/>
  <circle cx="256" cy="122" r="2.5" fill="#c8752a"/>

  <!-- Text -->
  <text x="256" y="465" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="30" fill="#ffffff" text-anchor="middle" letter-spacing="3">THE LOAD BENCH</text>
  <text x="256" y="492" font-family="Arial, sans-serif" font-size="12" fill="#c8752a" text-anchor="middle" letter-spacing="5">PRECISION HANDLOADING</text>
</svg>
